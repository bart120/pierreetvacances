apiVersion: v1
kind: Namespace
metadata:
  name: test-apache
--
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apache-deployment
  namespace: test-apache
  labels:
    app: apache
spec:
  replicas: 2
  selector:
    matchLabels:
      app: apache
  template:
    metadata:
      labels:
        app: apache
    spec:
      containers:
      - name: apache-cont
        image: httpd:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
--
apiVersion: v1
kind: Service
metadata:
  name: apache-service
  namespace: test-apache
spec:
  selector:
    app: apache
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP